<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpiderCam – Live Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    #thermal-stream {
      display: block;
      width: 100%;
      height: calc(100vh - 44px);
      object-fit: contain;
    }

    #temp-bar {
      height: 44px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: #111;
      border-top: 1px solid #222;
    }

    .temp-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .temp-label {
      color: #666;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .temp-val {
      color: #f0f0f0;
      font-size: 18px;
      font-weight: bold;
      min-width: 70px;
    }

    #temp-min-val { color: #5bc8ff; }
    #temp-max-val { color: #ff7043; }
  </style>
</head>
<body>
  <img id="thermal-stream" src="/api/camera/stream" alt="Live thermal feed">

  <div id="temp-bar">
    <div class="temp-item">
      <span class="temp-label">min</span>
      <span class="temp-val" id="temp-min-val">--°C</span>
    </div>
    <div class="temp-item">
      <span class="temp-label">max</span>
      <span class="temp-val" id="temp-max-val">--°C</span>
    </div>
  </div>

  <script>
    (function pollTemps() {
      fetch('/api/camera/frame.json')
        .then(r => r.json())
        .then(d => {
          document.getElementById('temp-min-val').textContent = d.min.toFixed(1) + '°C';
          document.getElementById('temp-max-val').textContent = d.max.toFixed(1) + '°C';
        })
        .catch(() => {})
        .finally(() => setTimeout(pollTemps, 1000));
    })();
  </script>
</body>
</html>
