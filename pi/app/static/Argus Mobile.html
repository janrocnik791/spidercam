<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Argus — Mobile</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at center, #1a1d24 0%, #06080c 100%);
    height: 100vh; overflow: hidden;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  #stage {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  #design { transform-origin: center center; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.85); }
  }
  input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: transparent; cursor: pointer; }
  input[type="range"]::-moz-range-thumb { width: 22px; height: 22px; background: transparent; border: 0; cursor: pointer; }
  *::-webkit-scrollbar { width: 4px; height: 4px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>
<div id="stage"><div id="design"><div id="root"></div></div></div>

<script>
  // Scale 402×874 to fit viewport
  function fit() {
    const margin = 40;
    const s = Math.min((window.innerWidth - margin) / 402, (window.innerHeight - margin) / 874, 1.5);
    document.getElementById('design').style.transform = `scale(${s})`;
  }
  window.addEventListener('resize', fit);
  setTimeout(fit, 0);
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Shared building blocks: icons, ThermalFeed, HistoryThumb, ArgusLogo -->
<script type="text/babel" src="shared.jsx"></script>

<!-- Argus brand tokens (v6) and data -->
<script type="text/babel">
  // Re-export v6 tokens to window so v6-mobile.jsx can read them
  // (these are also defined in v6-argus.jsx but we don't load that here)
  const OMV_NAVY = '#06275c';
  const OMV_NAVY_DEEP = '#04193b';
  const OMV_NAVY_HI = '#1d4a8f';
  const OMV_BLUE_GLOW = '#3b7dd8';
  const v6 = {
    canvas: '#06080c',
    surface: '#0c0f15',
    surfaceHi: '#11151d',
    inset: '#04060a',
    hair: 'rgba(238,232,222,0.07)',
    hairBright: 'rgba(238,232,222,0.14)',
    text: '#eef0f3',
    textDim: '#bdc1c9',
    mute: '#8a8f99',
    faint: '#4d525c',
    danger: '#e54545',
    warn: '#e5b94a',
    ok: '#5bba6f',
    mono: { fontFamily: '"JetBrains Mono", monospace' },
    brand: { fontFamily: '"Helvetica Neue", Helvetica, Arial, sans-serif', letterSpacing: 6, fontWeight: 500 },
  };

  // Argus logo (X-drone with corner brackets + center cube)
  function ArgusLogo({ size = 24, color = '#fff' }) {
    return (
      <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
        <path d="M 6 6 L 6 14 M 6 6 L 14 6" stroke={color} strokeWidth="3" strokeLinecap="square" />
        <path d="M 58 6 L 58 14 M 58 6 L 50 6" stroke={color} strokeWidth="3" strokeLinecap="square" />
        <path d="M 6 58 L 6 50 M 6 58 L 14 58" stroke={color} strokeWidth="3" strokeLinecap="square" />
        <path d="M 58 58 L 58 50 M 58 58 L 50 58" stroke={color} strokeWidth="3" strokeLinecap="square" />
        <line x1="11" y1="11" x2="27" y2="27" stroke={color} strokeWidth="1.4" />
        <line x1="53" y1="11" x2="37" y2="27" stroke={color} strokeWidth="1.4" />
        <line x1="11" y1="53" x2="27" y2="37" stroke={color} strokeWidth="1.4" />
        <line x1="53" y1="53" x2="37" y2="37" stroke={color} strokeWidth="1.4" />
        <polygon points="32,22 42,28 32,34 22,28" fill={color} opacity="0.95" />
        <polygon points="32,34 42,28 42,40 32,46" fill={color} opacity="0.65" />
        <polygon points="32,34 22,28 22,40 32,46" fill={color} opacity="0.85" />
      </svg>
    );
  }

  Object.assign(window, { OMV_NAVY, OMV_NAVY_DEEP, OMV_NAVY_HI, OMV_BLUE_GLOW, v6, ArgusLogo });
</script>

<script type="text/babel" src="v6-data.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="v6-mobile.jsx"></script>

<script type="text/babel">
  function App() {
    return (
      <IOSDevice dark={true} width={402} height={874}>
        <MobileArgus />
      </IOSDevice>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
