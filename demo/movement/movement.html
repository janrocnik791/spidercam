<!doctype html>
<!--
  Spidercam — Inspection Movement
  ================================
  Self-contained movement demo, served by the waypoint server at
      http://192.168.253.249:8765/demo/movement
  Functionally based on the ESP32's /pathmarker pendant, tidied up.

  Talks directly to the hardware (same as /pathmarker):
    • ESP32 (192.168.253.85): /positions, /perimeter/play, /abort, /jog, /jogstop
    • Waypoint server (same origin): /corners/load
  The inspection route lives in the firmware (/perimeter/play) and is not changed here.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spidercam — Inspection Movement</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --panel2:#1b222c; --line:#28313c;
    --text:#e6edf3; --muted:#8b96a3; --faint:#5b6673;
    --green:#2ea043; --green-hi:#3fb950; --red:#da3633; --red-hi:#f85149;
    --blue:#2f81f7; --amber:#bb8009;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    margin:0; background:var(--bg); color:var(--text);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.4; padding:20px 16px 40px;
  }
  .wrap { max-width:720px; margin:0 auto; }

  header { margin-bottom:18px; }
  header h1 { font-size:21px; font-weight:650; margin:0; letter-spacing:-0.2px; }
  header .sub { color:var(--muted); font-size:13px; margin-top:3px; }

  .card {
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:18px; margin-bottom:16px;
  }
  .card h2 {
    font-size:12px; font-weight:600; letter-spacing:1.4px; text-transform:uppercase;
    color:var(--muted); margin:0 0 14px;
  }
  .num { font-family:var(--mono); font-variant-numeric:tabular-nums; }

  /* 1 — status bar */
  .statusbar { position:sticky; top:12px; z-index:5; backdrop-filter:blur(6px); }
  .srow { display:flex; align-items:center; flex-wrap:wrap; gap:10px 22px; }
  .srow + .srow { margin-top:12px; padding-top:12px; border-top:1px solid var(--line); }
  .stat { display:flex; align-items:baseline; gap:6px; }
  .stat .k { color:var(--faint); font-size:11px; letter-spacing:.5px; text-transform:uppercase; }
  .stat .v { font-family:var(--mono); font-size:18px; font-weight:600; }
  .stat.cab .v { font-size:15px; color:var(--text); }
  .stat.cab .k { font-size:11px; }
  .rstatus { margin-left:auto; display:flex; align-items:center; gap:9px;
    font-family:var(--mono); font-size:13px; font-weight:600; padding:7px 14px;
    border-radius:999px; background:var(--panel2); border:1px solid var(--line); }
  .rstatus .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); }
  .rstatus.ready    .dot { background:var(--green-hi); }
  .rstatus.run      .dot { background:var(--blue); animation:pulse 1.1s infinite; }
  .rstatus.complete .dot { background:var(--green-hi); }
  .rstatus.abort    .dot { background:var(--red-hi); animation:pulse .8s infinite; }
  .rstatus.offline  .dot { background:var(--faint); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* 2 — inspection control */
  button { font-family:inherit; cursor:pointer; border:0; border-radius:11px;
    color:#fff; font-weight:650; transition:filter .1s, transform .04s, opacity .1s; }
  button:active:not(:disabled) { transform:translateY(1px); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  .btn-start { width:100%; background:var(--green); font-size:18px; letter-spacing:.4px;
    padding:20px; box-shadow:inset 0 1px 0 rgba(255,255,255,.18); }
  .btn-start:hover:not(:disabled) { background:var(--green-hi); }
  .btn-abort { width:100%; margin-top:10px; background:var(--red); font-size:15px;
    letter-spacing:1px; padding:13px; }
  .btn-abort:hover:not(:disabled) { background:var(--red-hi); }
  .msg { min-height:18px; margin-top:12px; font-size:13.5px; font-weight:500; }
  .msg.err { color:var(--red-hi); }
  .msg.ok  { color:var(--green-hi); }
  .progwrap { margin-top:16px; display:none; }
  .proglabel { font-family:var(--mono); font-size:13px; color:var(--text); margin-bottom:8px;
    display:flex; justify-content:space-between; }
  .proglabel .pct { color:var(--muted); }
  .progbar { height:12px; border-radius:7px; background:var(--panel2);
    border:1px solid var(--line); overflow:hidden; }
  .progfill { height:100%; width:0%; border-radius:6px;
    background:linear-gradient(90deg,var(--blue),#5aa2ff); transition:width .4s ease; }

  /* 3 — manual jog */
  details.jog summary { cursor:pointer; list-style:none; font-size:12px; font-weight:600;
    letter-spacing:1.4px; text-transform:uppercase; color:var(--muted); }
  details.jog summary::-webkit-details-marker { display:none; }
  details.jog summary::before { content:'▸'; display:inline-block; width:16px; color:var(--faint); }
  details.jog[open] summary::before { content:'▾'; }
  .jinner { padding-top:16px; }
  .jrow { display:grid; grid-template-columns:34px 1fr 1fr; gap:8px; align-items:center;
    margin-bottom:8px; }
  .jrow .mn { font-family:var(--mono); font-size:13px; color:var(--muted); }
  .jbtn { padding:13px 6px; font-size:13px; font-weight:600; letter-spacing:.4px; }
  .jbtn.wind   { background:#1f4f8f; }
  .jbtn.unwind { background:#7a5410; }
  .jbtn.holding { filter:brightness(1.5); box-shadow:inset 0 0 0 2px rgba(255,255,255,.3); }
  .jall { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px;
    padding-top:12px; border-top:1px solid var(--line); }
  .jall .jbtn { padding:14px 6px; }

  /* 4 — corner status */
  .corners { display:flex; gap:10px; flex-wrap:wrap; }
  .chip { display:flex; align-items:center; gap:7px; font-family:var(--mono); font-size:14px;
    font-weight:600; padding:8px 14px; border-radius:9px; background:var(--panel2);
    border:1px solid var(--line); }
  .chip .mk { font-size:15px; line-height:1; }
  .chip.set   { border-color:rgba(46,160,67,.5); }
  .chip.set   .mk { color:var(--green-hi); }
  .chip.unset { border-color:rgba(218,54,51,.45); }
  .chip.unset .mk { color:var(--red-hi); }
  .cnote { color:var(--faint); font-size:12px; margin-top:12px; }
  .cnote a { color:var(--blue); text-decoration:none; }
  .cnote a:hover { text-decoration:underline; }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1>Spidercam &mdash; Inspection Movement</h1>
    <div class="sub">Thermal-inspection gantry &middot; movement &amp; route control</div>
  </header>

  <!-- 1 — Status bar -->
  <div class="card statusbar">
    <div class="srow">
      <div class="stat"><span class="k">X</span><span class="v" id="px">--</span></div>
      <div class="stat"><span class="k">Y</span><span class="v" id="py">--</span></div>
      <div class="stat"><span class="k">Z</span><span class="v" id="pz">--</span><span class="k">cm</span></div>
      <div class="rstatus offline" id="rstatus"><span class="dot"></span><span id="rstatustxt">Connecting…</span></div>
    </div>
    <div class="srow">
      <div class="stat cab"><span class="k">M1</span><span class="v" id="m1">--</span></div>
      <div class="stat cab"><span class="k">M2</span><span class="v" id="m2">--</span></div>
      <div class="stat cab"><span class="k">M3</span><span class="v" id="m3">--</span></div>
      <div class="stat cab"><span class="k">M4</span><span class="v" id="m4">--</span><span class="k">cm</span></div>
    </div>
  </div>

  <!-- 2 — Inspection control -->
  <div class="card">
    <h2>Inspection</h2>
    <button class="btn-start" id="btnStart">START INSPECTION</button>
    <button class="btn-abort" id="btnAbort">ABORT &mdash; RETURN HOME</button>
    <div class="msg" id="msg"></div>
    <div class="progwrap" id="progwrap">
      <div class="proglabel"><span id="proglabel">&mdash;</span><span class="pct" id="progpct"></span></div>
      <div class="progbar"><div class="progfill" id="progfill"></div></div>
    </div>
  </div>

  <!-- 3 — Manual jog -->
  <div class="card">
    <details class="jog" id="jogBox">
      <summary>Manual Controls</summary>
      <div class="jinner">
        <div id="jogMotors"></div>
        <div class="jall">
          <button class="jbtn wind"   data-m="all" data-dir="wind">WIND ALL</button>
          <button class="jbtn unwind" data-m="all" data-dir="unwind">UNWIND ALL</button>
        </div>
      </div>
    </details>
  </div>

  <!-- 4 — Corner status -->
  <div class="card">
    <h2>Corner Status</h2>
    <div class="corners" id="corners">
      <div class="chip"><span class="mk">·</span>C1</div>
      <div class="chip"><span class="mk">·</span>C2</div>
      <div class="chip"><span class="mk">·</span>C3</div>
      <div class="chip"><span class="mk">·</span>C4</div>
    </div>
    <div class="cnote">Set corners at <a href="http://192.168.253.85/pathmarker">http://192.168.253.85/pathmarker</a></div>
  </div>

</div>

<script>
// ── Endpoints ────────────────────────────────────────────────────────────────
const ESP32 = 'http://192.168.253.85';   // motors + route (cross-origin; CORS enabled in firmware)
// Corners come from THIS server (same origin); relative URL keeps it host-independent.
const CORNERS_URL = '/corners/load';

const $ = (id) => document.getElementById(id);
const n1 = (v) => (v == null || isNaN(v)) ? '--' : Number(v).toFixed(1);

async function jget(url) {
  const r = await fetch(url, { cache: 'no-store' });
  const j = await r.json().catch(() => ({}));
  if (!r.ok) { const e = new Error((j && j.error) || ('HTTP ' + r.status)); e.body = j; throw e; }
  return j;
}

// ── State machine ──────────────────────────────────────────────────────────
// 'ready' | 'inspecting' | 'aborting' | 'complete'
let state = 'ready';
let seenActive = false;     // route seen active since last START (avoids false "complete")
let abortAt = 0;
const TOTAL_STEPS = 7;

function setStatus(cls, txt) {
  $('rstatus').className = 'rstatus ' + cls;
  $('rstatustxt').textContent = txt;
}
function setMsg(txt, kind) { const m = $('msg'); m.textContent = txt || ''; m.className = 'msg' + (kind ? ' ' + kind : ''); }
function showProgress(show) { $('progwrap').style.display = show ? 'block' : 'none'; }
function setProgress(step, total, label) {
  const pct = total ? Math.min(100, Math.round(step / total * 100)) : 0;
  $('progfill').style.width = pct + '%';
  $('progpct').textContent = pct + '%';
  $('proglabel').textContent = label;
}

function setJogEnabled(enabled) {
  document.querySelectorAll('.jbtn').forEach(b => { b.disabled = !enabled; });
}

// ── Live poll: ESP32 /positions every 500ms ──────────────────────────────────
async function pollPositions() {
  let j;
  try { j = await jget(ESP32 + '/positions'); }
  catch { setStatus('offline', 'ESP32 offline'); return; }

  if (j.xyz) { $('px').textContent = n1(j.xyz[0]); $('py').textContent = n1(j.xyz[1]); $('pz').textContent = n1(j.xyz[2]); }
  if (j.m)   { for (let i = 0; i < 4; i++) $('m' + (i + 1)).textContent = n1(j.m[i]); }

  const route = j.route || { active: false, step: 0, total: TOTAL_STEPS, label: '' };
  const move  = j.move  || { active: false };

  if (route.active) {
    state = 'inspecting'; seenActive = true;
    setStatus('run', `Inspecting — Step ${route.step} of ${route.total}`);
    showProgress(true);
    setProgress(route.step, route.total, route.label || 'Inspecting');
  } else if (state === 'inspecting' && seenActive) {
    // Route just finished naturally.
    state = 'complete';
    setStatus('complete', 'Complete');
    setProgress(route.total || TOTAL_STEPS, route.total || TOTAL_STEPS, 'Route complete');
    setMsg('Route complete — gantry home.', 'ok');
    setTimeout(() => { if (state === 'complete') showProgress(false); }, 2500);
  } else if (state === 'aborting') {
    setStatus('abort', 'Aborting — returning home');
    showProgress(true);
    setProgress(route.step || 0, route.total || TOTAL_STEPS, 'Returning home');
    if (!move.active && Date.now() - abortAt > 1500) {
      state = 'ready'; showProgress(false);
      setStatus('ready', 'Ready'); setMsg('');
    }
  } else if (state !== 'complete') {
    state = 'ready';
    setStatus('ready', 'Ready');
    showProgress(false);
  }

  // Jog + Start are locked while the gantry is moving.
  const busy = route.active || move.active || state === 'inspecting' || state === 'aborting';
  setJogEnabled(!busy);
  $('btnStart').disabled = busy;
}

// ── START INSPECTION ──────────────────────────────────────────────────────────
async function startInspection() {
  if ($('btnStart').disabled) return;
  setMsg('Checking corners…');
  let corners;
  try { corners = await jget(CORNERS_URL); }
  catch { setMsg('Cannot reach waypoint server (corners).', 'err'); return; }
  const missing = (corners || []).filter(c => !c.set).map(c => c.index + 1);
  if (missing.length) {
    const label = missing.length === 1 ? ('Corner ' + missing[0]) : ('Corners ' + missing.join(', '));
    setMsg(label + ' not set — set corners in pathmarker first', 'err');
    return;
  }
  try { await jget(ESP32 + '/perimeter/play'); }
  catch (e) {
    if (e.body && e.body.error === 'corners_not_set') {
      const m = (e.body.missing || []);
      setMsg((m.length === 1 ? 'Corner ' + m[0] : 'Corners ' + m.join(', ')) + ' not set — set corners in pathmarker first', 'err');
    } else if (String(e.message).indexOf('busy') >= 0) setMsg('Busy — a move is already running.', 'err');
    else setMsg('Could not start route: ' + e.message, 'err');
    return;
  }
  state = 'inspecting'; seenActive = false; abortAt = 0;
  setMsg('Inspection started.', 'ok');
  setStatus('run', 'Inspecting — Step 1 of 7');
  showProgress(true); setProgress(1, TOTAL_STEPS, 'Raising from home');
  $('btnStart').disabled = true;
  setJogEnabled(false);
}

// ── ABORT ──────────────────────────────────────────────────────────────────
async function abortRoute() {
  state = 'aborting'; abortAt = Date.now();
  setStatus('abort', 'Aborting — returning home');
  setMsg('Aborting — returning home.', 'err');
  showProgress(true); setProgress(0, TOTAL_STEPS, 'Returning home');
  $('btnStart').disabled = true; setJogEnabled(false);
  try { await jget(ESP32 + '/abort'); } catch { /* poll recovers the UI */ }
}

// ── Manual jog (hold-to-move, same endpoints/pattern as pathmarker) ───────────
function sendJog(m, dir) { fetch(`${ESP32}/jog?m=${m}&dir=${dir}`, { cache: 'no-store' }).catch(() => {}); }
function sendJogStop(m)  { fetch(`${ESP32}/jogstop?m=${m}`, { cache: 'no-store' }).catch(() => {}); }
function bindHold(btn) {
  const m = btn.dataset.m, dir = btn.dataset.dir; let ka = null;
  const start = (ev) => {
    if (ev) ev.preventDefault();
    if (ka || btn.disabled) return;
    btn.classList.add('holding'); sendJog(m, dir);
    ka = setInterval(() => sendJog(m, dir), 150);
  };
  const end = () => {
    if (!ka) return;
    clearInterval(ka); ka = null;
    btn.classList.remove('holding'); sendJogStop(m);
  };
  btn.addEventListener('pointerdown', start);
  btn.addEventListener('pointerup', end);
  btn.addEventListener('pointerleave', end);
  btn.addEventListener('pointercancel', end);
}

// Build the 4 per-motor jog rows.
const jm = $('jogMotors');
for (let m = 1; m <= 4; m++) {
  const row = document.createElement('div');
  row.className = 'jrow';
  row.innerHTML =
    '<span class="mn">M' + m + '</span>' +
    '<button class="jbtn wind"   data-m="' + m + '" data-dir="wind">WIND</button>' +
    '<button class="jbtn unwind" data-m="' + m + '" data-dir="unwind">UNWIND</button>';
  jm.appendChild(row);
}
document.querySelectorAll('.jbtn').forEach(bindHold);

// ── Corner status (load + every 5s) ──────────────────────────────────────────
async function loadCorners() {
  let corners;
  try { corners = await jget(CORNERS_URL); } catch { return; }
  const wrap = $('corners');
  wrap.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const c = (corners && corners[i]) || { set: false };
    const chip = document.createElement('div');
    chip.className = 'chip ' + (c.set ? 'set' : 'unset');
    chip.innerHTML = '<span class="mk">' + (c.set ? '✓' : '✗') + '</span>C' + (i + 1);
    wrap.appendChild(chip);
  }
}

// ── Wire up + boot ───────────────────────────────────────────────────────────
$('btnStart').addEventListener('click', startInspection);
$('btnAbort').addEventListener('click', abortRoute);

loadCorners();
pollPositions();
setInterval(pollPositions, 500);
setInterval(loadCorners, 5000);
</script>
</body>
</html>
